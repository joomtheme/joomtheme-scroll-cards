<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JT Scroll Cards Demo</title>
  <meta name="description" content="Bootstrap 5 compatible sticky scroll cards module demo for Joomla 6.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #4b5563;
      --link: #2563eb;
      --shadow: rgba(15, 23, 42, .18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .demo-card {
      background: var(--card);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 24px 60px var(--shadow);
    }

    video {
      display: block;
      width: 100%;
      border-radius: 20px;
      background: #000;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a {
      color: var(--link);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--link);
      color: #fff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .25);
    }

    .button:hover {
      text-decoration: none;
      background: #1d4ed8;
    }

    .footer {
      margin-top: 36px;
      text-align: center;
      font-size: .95rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="hero">
      <h1>JT Scroll Cards Demo</h1>
      <p>
        Bootstrap 5 compatible sticky scroll cards module for Joomla 6.
      </p>
    </section>

    <section class="demo-card" aria-label="JT Scroll Cards demo video">
      <video controls playsinline preload="metadata">
        <source src="assets/jt-scroll-cards-demo.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </section>

    <div class="actions">
      <a class="button" href="assets/jt-scroll-cards-demo.mp4">
        Open demo video
      </a>

      <a href="https://github.com/joomtheme/joomtheme-scroll-cards">
        View on GitHub
      </a>
    </div>

    <p class="footer">
      JT Scroll Cards for Joomla 6
    </p>
  </main>
</body>
</html>
